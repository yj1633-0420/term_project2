<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>202655478_term_project</title>
</head>

<style>

        /* 전체 스타일 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "맑은 고딕", sans-serif;
            background-color: #f4f7fb;
            color: #333;
            line-height: 1.6;
            overflow-x:hidden;
        }

        /* 헤더 */
        header {
            background: linear-gradient(to right, #2b7de9, #5aa9ff);
            color: white;
            text-align: center;
            padding: 30px;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 네비게이션 */
        nav {
            background-color: white;
            border-bottom: 2px solid #dbe7f5;
        }

        nav ul {
            list-style: none;
            overflow: hidden;
        }

        nav ul li {
            float: left;   /* Float 사용 */
        }

        nav ul li a {
            display: block;
            padding: 18px 30px;
            text-decoration: none;
            color: #2b7de9;
            font-weight: bold;
            transition: 0.3s;
        }

        nav ul li a:hover {   /* Pseudo-class 사용 */
            background-color: #2b7de9;
            color: white;
        }

        nav::after {   /* Pseudo-element 사용 */
            content: "";
            display: block;
            clear: both;   /* Clear 사용 */
        }

        /* 메인 */
        main {
            width: 90%;
            margin: 30px auto;
        }

        section {
            background-color: white;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        section h2 {
            margin-bottom: 20px;
            color: #2b7de9;
            border-left: 8px solid #2b7de9;
            padding-left: 12px;
        }

        /* 폼 */
        #search-form label {
            font-weight: bold;
        }

        input[type="text"],   /* Attribute Selector */
        input[type="time"] {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 10px;
            transition: 0.3s;
        }

        input[type="text"]:focus,
        input[type="time"]:focus {
            border-color: #2b7de9;
            outline: none;
            box-shadow: 0 0 5px rgba(43,125,233,0.4);
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            margin-right: 15px;
        }

        button {
            background-color: #2b7de9;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #155db8;
            transform: translateY(-2px);
        }

        /* 지도 */
        #map {
            width: 100%;
            max-width: 100%;
            height: 300px;

            background-color: #d9e8ff;
            border: 2px dashed #2b7de9;
            border-radius: 10px;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;
        }

        #map p{
            font-size:20px;
            color:#555;
        }

        /* 테이블 */
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        .table-container{
            overflow-x: auto;
        }

        thead {
            background-color: #2b7de9;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {   /* Pseudo-class */
            background-color: #f7fbff;
        }

        tbody tr:hover {
            background-color: #e6f0ff;
        }

        /* 푸터 */
        footer {
            background-color: #1f2937;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        footer p::before {   /* Pseudo-element */
            content: "🏥 ";
        }

        /* Combinator 사용 */

        nav ul > li {                 /* Child combinator */
            border-right: 1px solid #ddd;
        }

        section h2 + form {           /* Adjacent sibling combinator */
            margin-top: 10px;
        }

        section h2 ~ table {          /* General sibling combinator */
            margin-top: 20px;
        }

        .filter-group label input {   /* Descendant combinator */
            margin-right: 5px;
        }

        main > section {              /* Child combinator */
            position: relative;
        }

        /* 모바일 반응형 */
        @media screen and (max-width: 900px) {

            header {
                font-size: 24px;
                padding: 20px;
            }

            nav ul li {
                float: none;
                width: 100%;
                text-align: center;
            }

            nav ul li a {
                border-bottom: 1px solid #ddd;
            }

            main {
                width: 95%;
            }

            section {
                padding: 18px;
            }

            .table-container{
                width: 100%;
                overflow-x:auto;
            }

            table{
                width: 100%;
                min-width:600px;
            }
        }

    </style>


<body>
    <header>
        부산광역시 실시간 병원 & 약국 찾기
    </header>

    <nav>
        <ul>
            <li><a href ="">검색하기</a></li> <!--나중에 추가-->
            <li><a href ="">지도보기</a></li> <!--나중에 추가-->
            <li><a href ="">목록보기</a></li> <!--나중에 추가-->
        </ul>
    </nav>

    <main>
        <section id = "search-section">
            <h2>운영 시간 및 기관 검색</h2>

            <form id = "search-form">
                <label for = "search-name">기관명 :</label>
                <input type = "text" id = "search-name" placeholder="병원 & 약국 이름 입력">

                <label for = "search-time">희망 시간 :</label>
                <input type = "time" id = "search-time" placeholder="희망 시간 입력">

                <div class = "filter-group">
                    <label><input type="checkbox" name="type" value="hospital" checked> 종합병원</label>
                    <label><input type="checkbox" name="type" value="pharmacy" checked> 약국</label>
                    <label><input type="checkbox" name="type" value="emergency" checked> 응급실</label>
                </div>

                <button type="button" id = "search-btn">검색하기</button>
            </form>
        </section>

        <hr>

        <section id = "map-section">
            <h2>내 주변 지도</h2>
            <div id = "map">
                <p>지도 로딩 중...</p>
            </div>

            <button id = "get-direction-btn">길찾기</button>

        </section>

        <section id = "list-section">
            <h2>운영 중인 기관 목록</h2>
            <div class="table-container">
                <table border="1" id="hospital-table">
                    <thead>
                        <tr>
                            <th>기관명</th>
                            <th>주소</th>
                            <th>전화번호</th>
                            <th>운영시간</th>
                            <th>거리</th>
                        </tr>
                    </thead>
                    <tbody id = "hospital-list-body">
                        <tr>
                            <td>검색 결과가 없습니다.</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 202655478 이유진 - 인터넷과 웹기초 텀프로젝트</p>
    </footer>

    <script src=""></script> <!--나중에 추가-->
    <script src=""></script> <!--나중에 추가-->

</body>
</html>
